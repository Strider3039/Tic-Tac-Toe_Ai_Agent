name: Notify Discord on Push

on:
  push:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect Commit Details
        shell: bash
        run: |
          AUTHOR="$(git log -1 --pretty=format:%an)"
          MESSAGE="$(git log -1 --pretty=format:%s)"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          COMMIT_URL="https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            ADDED="$(git diff --diff-filter=A --name-only HEAD^ HEAD)"
            MODIFIED="$(git diff --diff-filter=M --name-only HEAD^ HEAD)"
            REMOVED="$(git diff --diff-filter=D --name-only HEAD^ HEAD)"
          else
            ADDED="$(git ls-tree --name-only -r HEAD)"
            MODIFIED=""
            REMOVED=""
          fi

          format_list() {
            if [ -z "$1" ]; then
              echo "None"
            else
              echo "$1" | sed 's/^/• /' | head -n 15
            fi
          }

          ADDED_FMT="$(format_list "$ADDED")"
          MODIFIED_FMT="$(format_list "$MODIFIED")"
          REMOVED_FMT="$(format_list "$REMOVED")"

          {
            echo "AUTHOR<<EOF"
            echo "$AUTHOR"
            echo "EOF"

            echo "MESSAGE<<EOF"
            echo "$MESSAGE"
            echo "EOF"

            echo "SHORT_SHA=$SHORT_SHA"
            echo "COMMIT_URL=$COMMIT_URL"
            echo "REPO_URL=$REPO_URL"
            echo "BRANCH=$BRANCH"

            echo "FILES_ADDED<<EOF"
            echo "$ADDED_FMT"
            echo "EOF"

            echo "FILES_CHANGED<<EOF"
            echo "$MODIFIED_FMT"
            echo "EOF"

            echo "FILES_REMOVED<<EOF"
            echo "$REMOVED_FMT"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send Embedded Message to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        shell: bash
        run: |
          jq -n \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg repo_url "$REPO_URL" \
            --arg branch "$BRANCH" \
            --arg author "$AUTHOR" \
            --arg message "$MESSAGE" \
            --arg sha "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg added "$FILES_ADDED" \
            --arg changed "$FILES_CHANGED" \
            --arg removed "$FILES_REMOVED" \
            '{
              username: "GitHub Push Bot",
              embeds: [
                {
                  title: "New Push to \($repo)",
                  url: $repo_url,
                  color: 3447003,
                  fields: [
                    {
                      name: "Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "Author",
                      value: $author,
                      inline: true
                    },
                    {
                      name: "Commit",
                      value: "[\($sha)](\($commit_url))",
                      inline: true
                    },
                    {
                      name: "Commit Message",
                      value: $message,
                      inline: false
                    },
                    {
                      name: "Files Added",
                      value: $added,
                      inline: false
                    },
                    {
                      name: "Files Changed",
                      value: $changed,
                      inline: false
                    },
                    {
                      name: "Files Removed",
                      value: $removed,
                      inline: false
                    }
                  ],
                  footer: {
                    text: "GitHub Actions Discord Notifier"
                  },
                  timestamp: now | todate
                }
              ]
            }' > discord.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @discord.json \
               "$DISCORD_WEBHOOK_URL"